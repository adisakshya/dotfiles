name: install-integration

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  install-linux:
    name: Install profile — Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create VS Code config directory
        run: mkdir -p "$HOME/.config/Code/User"

      - name: Install dotfiles (linux profile)
        run: ./install-profile linux

      - name: Verify symlinks
        run: |
          set -eu
          repo="$GITHUB_WORKSPACE"
          fail=0
          check() {
            local link="$1" target="$2"
            if [ ! -L "$link" ]; then
              echo "FAIL: $link is not a symlink"
              fail=1
              return
            fi
            actual=$(readlink -f "$link")
            expected=$(readlink -f "$target")
            if [ "$actual" != "$expected" ]; then
              echo "FAIL: $link -> $actual (expected $expected)"
              fail=1
              return
            fi
            echo "OK:   $link"
          }
          check "$HOME/.bashrc"                         "$repo/common/bash/.bashrc"
          check "$HOME/.bash_profile"                   "$repo/common/bash/.bash_profile"
          check "$HOME/.aliases"                        "$repo/.aliases"
          check "$HOME/.exports"                        "$repo/.exports"
          check "$HOME/adisakshya.yaml"                 "$repo/common/oh-my-posh/adisakshya.yaml"
          check "$HOME/.config/Code/User/settings.json" "$repo/common/vscode/settings.json"
          check "$HOME/.zshrc"                          "$repo/linux/zsh/.zshrc"
          exit $fail

  install-codespaces:
    name: Codespaces entrypoint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create VS Code config directory
        run: mkdir -p "$HOME/.config/Code/User"

      - name: Run install.sh
        # install.sh auto-detects DOTFILES_DIR from BASH_SOURCE[0]; no env var needed.
        run: bash install.sh

      - name: Verify symlinks
        run: |
          set -eu
          repo="$GITHUB_WORKSPACE"
          fail=0
          check() {
            local link="$1" target="$2"
            if [ ! -L "$link" ]; then
              echo "FAIL: $link is not a symlink"
              fail=1
              return
            fi
            actual=$(readlink -f "$link")
            expected=$(readlink -f "$target")
            if [ "$actual" != "$expected" ]; then
              echo "FAIL: $link -> $actual (expected $expected)"
              fail=1
              return
            fi
            echo "OK:   $link"
          }
          check "$HOME/.bashrc"                         "$repo/common/bash/.bashrc"
          check "$HOME/.bash_profile"                   "$repo/common/bash/.bash_profile"
          check "$HOME/.aliases"                        "$repo/.aliases"
          check "$HOME/.exports"                        "$repo/.exports"
          check "$HOME/adisakshya.yaml"                 "$repo/common/oh-my-posh/adisakshya.yaml"
          check "$HOME/.config/Code/User/settings.json" "$repo/common/vscode/settings.json"
          check "$HOME/.zshrc"                          "$repo/linux/zsh/.zshrc"
          exit $fail

  install-windows:
    name: Install profile — Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run install-windows-copy.ps1
        shell: pwsh
        run: scripts/install-windows-copy.ps1

      - name: Verify copied files
        shell: pwsh
        run: |
          $fail = $false
          $repo = $env:GITHUB_WORKSPACE
          $checks = @(
            @{ Dest = "$env:USERPROFILE\.bashrc";         Src = "common/bash/.bashrc" },
            @{ Dest = "$env:USERPROFILE\.bash_profile";   Src = "common/bash/.bash_profile" },
            @{ Dest = "$env:USERPROFILE\.aliases";        Src = ".aliases" },
            @{ Dest = "$env:USERPROFILE\.exports";        Src = ".exports" },
            @{ Dest = "$env:USERPROFILE\adisakshya.yaml"; Src = "common/oh-my-posh/adisakshya.yaml" },
            @{ Dest = "$env:USERPROFILE\Documents\WindowsPowerShell\Microsoft.PowerShell_profile.ps1"; Src = "windows/powershell/profile.ps1" },
            @{ Dest = "$env:USERPROFILE\Documents\PowerShell\Microsoft.PowerShell_profile.ps1";        Src = "windows/powershell/profile.ps1" },
            @{ Dest = "$env:APPDATA\Code\User\settings.json";                                                                                          Src = "common/vscode/settings.json" },
            @{ Dest = "$env:LOCALAPPDATA\Packages\Microsoft.WindowsTerminal_8wekyb3d8bbwe\LocalState\settings.json";        Src = "windows/windows-terminal/settings.json" },
            @{ Dest = "$env:LOCALAPPDATA\Packages\Microsoft.WindowsTerminalPreview_8wekyb3d8bbwe\LocalState\settings.json"; Src = "windows/windows-terminal/settings.json" }
          )
          foreach ($check in $checks) {
            if (-not (Test-Path $check.Dest)) {
              Write-Host "FAIL: $($check.Dest) does not exist"
              $fail = $true
            } else {
              $destContent = Get-Content $check.Dest -Raw
              $srcContent  = Get-Content (Join-Path $repo $check.Src) -Raw
              if ($destContent -ne $srcContent) {
                Write-Host "FAIL: $($check.Dest) content differs from source"
                $fail = $true
              } else {
                Write-Host "OK:   $($check.Dest)"
              }
            }
          }
          if ($fail) { exit 1 }
